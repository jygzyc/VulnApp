<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MoChat Pay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background:#0F1115; color:#E8ECF1; padding:20px; padding-top: max(20px, env(safe-area-inset-top)); }
  h1 { font-size:22px; margin-bottom:20px; }
  .amount { text-align:center; margin:30px 0; }
  .amount .num { font-size:42px; font-weight:bold; color:#FF4D6A; font-family:monospace; }
  .amount .label { color:#9AA4B2; font-size:13px; margin-top:6px; }
  .merchant { background:#1E222B; border:1px solid #2A2F3A; border-radius:12px; padding:16px; margin-bottom:16px; display:flex; align-items:center; }
  .merchant .icon { width:40px; height:40px; background:#FF4D6A; border-radius:8px; margin-right:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .merchant .info h2 { font-size:15px; }
  .merchant .info p { font-size:12px; color:#9AA4B2; margin-top:2px; }
  .method { background:#1E222B; border:1px solid #2A2F3A; border-radius:10px; padding:14px; margin-bottom:10px; display:flex; align-items:center; cursor:pointer; }
  .method .dot { width:18px; height:18px; border-radius:50%; border:2px solid #4ADE80; margin-right:12px; }
  .method .name { font-size:14px; flex:1; }
  .method .balance { font-size:12px; color:#9AA4B2; }
  .btn { display:block; width:100%; background:#FF4D6A; color:#fff; border:none; border-radius:10px; padding:14px; font-size:16px; margin-top:24px; cursor:pointer; }
  #jwtDisplay { margin-top:20px; background:#171A21; border:1px dashed #3A2A30; border-radius:8px; padding:12px; font-size:11px; color:#FACC15; font-family:monospace; word-break:break-all; }
  #jwtDisplay .label { color:#9AA4B2; display:block; margin-bottom:6px; }
</style>
</head>
<body>
  <h1>🔒 Secure Payment</h1>

  <div class="merchant">
    <div class="icon">M</div>
    <div class="info">
      <h2>MoChat Mall</h2>
      <p>Order #MC-20260715-8842</p>
    </div>
  </div>

  <div class="amount">
    <div class="num">¥9.90</div>
    <div class="label">MoChat Premium (1 month)</div>
  </div>

  <div class="method">
    <div class="dot"></div>
    <div class="name">MoChat Wallet</div>
    <div class="balance">Balance: ¥1,000.00</div>
  </div>

  <button class="btn" onclick="pay()">Confirm Payment</button>

  <div id="jwtDisplay">
    <span class="label">⚠ Authorization header (chain #10 — MITM target):</span>
    <span id="jwt"></span>
  </div>

<script>
  // The native side injects the JWT via a URL fragment or JS bridge.
  // For the local demo we read it from the MoChat bridge if available.
  var jwt = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoidV8xMDAxIiwicm9sZSI6InVzZXIiLCJleHAiOjk5OTk5OTk5OTl9.s3cr3t';
  try {
    if (typeof MoChat !== 'undefined' && MoChat.getToken) {
      jwt = MoChat.getToken();
    }
  } catch(e) {}
  document.getElementById('jwt').textContent = jwt;

  function pay() {
    alert('Payment submitted.\nIn a real MITM scenario, the Authorization header above is captured by the attacker.');
  }
</script>
</body>
</html>
